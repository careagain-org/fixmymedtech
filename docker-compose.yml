services:
 
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_API_SECRET_KEY: ${SUPABASE_API_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
 
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    ports:
      - "5173:5173"
    depends_on:
      - backend
 
